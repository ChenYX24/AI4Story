# 前后端分离部署：nginx 跑在 :80，给前端 dist 提供静态文件 + 反代 /api 和 /outputs 到后端 :8000。
# 拷到服务器：sudo cp deploy/nginx.conf /etc/nginx/sites-available/ai4story && \
#            sudo ln -sf /etc/nginx/sites-available/ai4story /etc/nginx/sites-enabled/ai4story && \
#            sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8818 default_server;
    listen [::]:8818 default_server;
    server_name _;

    # 前端 dist —— 由 deploy_server.sh 把 apps/web/dist 拷贝到 /var/www/ai4story
    root /var/www/ai4story;
    index index.html;

    # SPA fallback：vue-router 路径找不到时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE / 长连接（report stream 等）
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # 本机磁盘存储兜底（OSS 模式下基本不会走到这里，但留着以防）
    location /outputs/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 官方场景资源（静态部署下不能落到 SPA fallback，要交给后端/OSS 逻辑处理）
    location /assets/scenes/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 客户端最大上传体积（图片上传 / 视频导入用得到）
    client_max_body_size 50M;
}
